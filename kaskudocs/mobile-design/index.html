  <!-- Main -->

    <div class="page" id="page-host">
      <div id="page-dashboard" class="page-view active"></div>
      <div id="page-transaksi" class="page-view"></div>
      <div id="page-chat" class="page-view"></div>
      <div id="page-kategori" class="page-view"></div>
      <div id="page-laporan" class="page-view"></div>
      <div id="page-akun" class="page-view"></div>
    </div>

    <div id="drawer-host"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="app-dashboard.js"></script>
<script src="app-pages.js"></script>
<script src="app-chat.js"></script>
<script>
const PAGE_TITLES = {
  dashboard: 'Dashboard',
  transaksi: 'Transaksi',
  chat: 'Chat WhatsApp',
  kategori: 'Kategori & Budget',
  laporan: 'Laporan',
  akun: 'Akun & Dompet',
};

const RENDERERS = {
  dashboard: window.renderDashboard,
  transaksi: window.renderTransaksi,
  chat: window.renderChat,
  kategori: window.renderKategori,
  laporan: window.renderLaporan,
  akun: window.renderAkun,
};

function goTo(page) {
  // Stop chat animation if leaving chat
  if (window.stopChat) window.stopChat();

  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  document.querySelectorAll('.page-view').forEach(v => v.classList.toggle('active', v.id === 'page-' + page));
  document.getElementById('crumb-page').textContent = PAGE_TITLES[page];

  const host = document.getElementById('page-' + page);
  if (host && RENDERERS[page]) host.innerHTML = RENDERERS[page]();

  // Scroll to top
  document.getElementById('page-host').scrollTop = 0;
}
window.goTo = goTo;

// Wire up nav clicks
document.querySelectorAll('.nav-item[data-page]').forEach(n => {
  n.addEventListener('click', () => goTo(n.dataset.page));
});

// Initial render
goTo('dashboard');
</script>
</body>
</html>
